apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: walk
spec:
  version: "v1.1.0"
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/HarshPanchal18/kubectl-walk/releases/download/v0.1.3/kubectl-walk-linux-amd64.tar.gz
    sha256: "b2913a8ba4a7ce90cadd91c1e5f3ef199fe8e4a728af8170575d331ed07eb132"
    bin: kubectl-walk-linux-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/HarshPanchal18/kubectl-walk/releases/download/v0.1.3/kubectl-walk-darwin-amd64.tar.gz
    sha256: "597dd1364ef1c1c811bf3adba621007705109a0557176f4d7ad8416fe7fd98f0"
    bin: kubectl-walk-darwin-amd64
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/HarshPanchal18/kubectl-walk/releases/download/v0.1.3/kubectl-walk-darwin-arm64.tar.gz
